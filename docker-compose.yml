services:
  postgres:
    image: postgres:16
    container_name: f1_postgres
    environment:
      POSTGRES_DB: formula1
      POSTGRES_USER: f1_user
      POSTGRES_PASSWORD: f1_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1_user -d formula1"]
      interval: 5s
      timeout: 5s
      retries: 20

  db_init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1_postgres_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: formula1
      DB_USER: f1_user
      DB_PASSWORD: f1_password
      DATA_DIR: /app/data/processed
      RESET_DATABASE: "true"
      LOAD_DATA: "true"
    volumes:
      - ./data/processed:/app/data/processed:ro
    restart: "no"

  neo4j:
    image: neo4j:5-community
    container_name: f1_neo4j
    environment:
      NEO4J_AUTH: neo4j/f1_password
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p f1_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 30

  neo4j_init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1_neo4j_init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: f1_password
      DATA_DIR: /app/data/processed
      RESET_NEO4J_DATABASE: "true"
      LOAD_NEO4J_DATA: "true"
      NEO4J_BATCH_SIZE: 5000
    command: ["python", "src/create_neo4j_graph.py"]
    volumes:
      - ./data/processed:/app/data/processed:ro
    restart: "no"

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
